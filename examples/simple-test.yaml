test:
  name: "Simple Test"

scenarios:
  - name: "Test Scenario"
    load:
      type: constant
      users: 1
      duration: "1m"
    
    steps:
      - request:
          method: POST
          url: /api/login
          extractors:
            - type: jsonpath
              var: token
              expression: $.data.token
            - type: jsonpath
              var: user_id
              expression: $.user.id
          assertions:
            - type: status
              value: 200
            - type: response_time
              max_ms: 500
