version: 1
frontend:
  phases:
    preBuild:
      commands:
        - if ! command -v bun >/dev/null 2>&1; then curl -fsSL https://bun.sh/install | bash; fi
        - export PATH="$HOME/.bun/bin:$PATH"
        - bun --version
        - bun install --frozen-lockfile
    build:
      commands:
        - export PATH="$HOME/.bun/bin:$PATH"
        - bun run build
  artifacts:
    baseDirectory: build
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
